name: vm_log_api_dio_example
description: "A project to showcase Dio integration with vm-log-api."
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  vm_log_api:
  vm_log_api_dio:
  path_provider:
  path:
  dio: ^5.8.0+1
  go_router: ^16.3.0

dev_dependencies:
  flutter_lints: ^5.0.0

dependency_overrides:
  vm_log_api:
    path: ../../packages/vm_log_api
  vm_log_api_dio:
    path: ../../packages/vm_log_api_dio

flutter:
  uses-material-design: true
